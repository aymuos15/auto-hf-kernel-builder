repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: ruff check --fix
        language: system
        types: [python]
        exclude: ^examples/
      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types: [python]
        exclude: ^examples/
      - id: pyrefly
        name: pyrefly (typecheck)
        entry: pyrefly check
        language: system
        types: [python]
        pass_filenames: false
