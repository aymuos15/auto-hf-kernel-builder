# Resolved config for the local KernelBench solve loop. No ssh/Spark, no
# kernel_lib build gate. prepare detects the device at runtime.
baseline:
  mode: max-autotune

gates:
  sequence: [correctness, perf]
  correctness:
    rtol: 2.0e-2
    atol: 2.0e-2
    shape_sweep_min_configs: 3
  perf:
    min_speedup_vs_compile: 1.05
    warmup_iters: 10
    timed_iters: 50

loop:
  max_retries: 6

agent:
  model: github-copilot/gemini-3-flash-preview
