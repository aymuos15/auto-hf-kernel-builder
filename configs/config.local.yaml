model:
  id: facebook/sam-vit-base
  loader: transformers
  task: promptable_concept_segmentation
  example_input:
    assets_dir: assets
    note: "provide a representative real input; never random/synthetic"

hardware:
  authoritative:
    name: spark
    host: sie271-pc
    arch: aarch64
    gpu: GB10
    compute_capability: "12.1"
    runtime: ngc_container
  iteration:
    name: local
    arch: x86_64
    gpu: "RTX A1000 Laptop"
    compute_capability: "8.6"
    vram_gb: 4
    runtime: native

exec:
  ssh: ""
  container: ""
  base_container: nvcr.io/nvidia/pytorch:25.11-py3
  remote_workdir: "$HOME/agentic-kernels"
  workdir: /work
  docker_run_extra: ""

env:
  assume_provisioned: true
  toolchain:
    base_container: nvcr.io/nvidia/pytorch:25.11-py3
    derived_container: agentic-kernels:ngc25.11
    torch: "2.10"
    triton: "3.5"
    kernels: "0.14.1"
    transformers: "5.8.1"
    cuda: "13"
  iteration_toolchain:
    torch: "2.10.0+cu128"
    transformers: ""

baseline:
  mode: max-autotune
  also_record_eager: true

gates:
  correctness:
    stages: [smoke, shape_sweep, adversarial_numerics, determinism, edge_cases]
    rtol: 2.0e-2
    atol: 2.0e-2
    shape_sweep_min_configs: 10
  build:
    builder: kernel-builder
    universal: true
    target_caps: ["12.1", "8.6"]
    kernel_builder_rev: b4accba4496b28faef19a0487fbcf9686b14e2ef
    nix_build_attr: ".#bundle"
    load: "pythonpath_import"
    must_load_local_build: true
  perf:
    min_speedup_vs_compile: 1.05
    measured_on: spark
    warmup_iters: 25
    timed_iters: 100

loop:
  max_retries: 6
  feed_error_class_back: true
  stop_on_first_pass: false

agent:
  model: github-copilot/gemini-3-flash-preview

integration:
  mechanism: transformers_kernel_hook
  assert_kernel_invoked: true

publish:
  enabled: false
  repo_template: "{model}-{block}-{lang}"
  local_only: true
