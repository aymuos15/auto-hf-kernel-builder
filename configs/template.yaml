# REFERENCE ONLY — not loaded by the pipeline. Copy to config.yaml (or
# config.local.yaml) and strip comments; the working configs are kept
# comment-free, all rationale lives here.
#
# Single source of truth: read by pipeline/driver.py and the skill scripts.
# Skills/pipeline are generic — they never name a model/GPU/host; they read
# it here. Artifact paths derive from model.id (slug = id with "/" -> "__").
#
# config.local.yaml is this with exec: blanked (ssh/container/docker_run_extra
# empty) so commands run in-process locally — for `prep` only; build/perf MUST
# stay on Spark. There is NO config-merge: driver.py loads ONE file, so every
# non-exec key must be hand-synced across the working configs.

model:
  id: facebook/sam-vit-base         # transformers-loadable target (smallest SAM)
  loader: transformers
  task: promptable_concept_segmentation
  example_input:
    assets_dir: assets              # representative real input; never synthetic
    note: "provide a representative real input; never random/synthetic"

hardware:
  authoritative:                    # decides pass/fail
    name: spark
    host: sie271-pc                 # ssh alias
    arch: aarch64
    gpu: GB10
    compute_capability: "12.1"      # sm_121 (Blackwell)
    runtime: ngc_container
  iteration:                        # smoke/correctness only, never authoritative
    name: local
    arch: x86_64
    gpu: "RTX A1000 Laptop"
    compute_capability: "8.6"
    vram_gb: 4
    runtime: native

exec:
  # ssh empty -> run locally; ssh set -> prefix commands (remote). container
  # set -> remote command runs inside it. ssh+container empty => bare "<CMD>".
  # BUILD gate runs kernel-builder via ssh WITHOUT the container (it's a host
  # Nix flake, not in the container/PyPI); everything else uses the container.
  ssh: "ssh sie271-pc"                 # "" in config.local.yaml
  container: agentic-kernels:ngc25.11  # derived image, built once by `make image`
  base_container: nvcr.io/nvidia/pytorch:25.11-py3  # only supported torch on
                                       # Blackwell aarch64; 25.12 breaks torchaudio
  remote_workdir: "$HOME/agentic-kernels"
  workdir: /work
  # -v HF cache: model downloaded once, reused across the per-step --rm
  # containers. --env-file injects HF_TOKEN. --user $(id -u):$(id -g): run as
  # host user so bind-mounted targets/+cache are NOT root-owned (that
  # collision was the real sync_error). HOME=/tmp + TRITON_CACHE_DIR: a
  # non-root user needs a writable HOME and Triton cache.
  docker_run_extra: "--gpus all --ipc=host --user $(id -u):$(id -g) -e HOME=/tmp -e TRITON_CACHE_DIR=/tmp/.triton -v $HOME/.cache/huggingface:/hf_cache -e HF_HOME=/hf_cache --env-file $HOME/agentic-kernels/secrets.env"

env:
  # Provisioned ONCE per machine by a human (AGENTS.md SETUP). The pipeline
  # trusts this block and fails loudly if reality disagrees — never re-provisions.
  assume_provisioned: true
  toolchain:
    base_container: nvcr.io/nvidia/pytorch:25.11-py3
    derived_container: agentic-kernels:ngc25.11
    torch: "2.10"
    triton: "3.5"
    kernels: "0.14.1"
    transformers: "5.8.1"
    cuda: "13"
  iteration_toolchain:
    torch: "2.10.0+cu128"   # local box, native
    transformers: ""        # filled by SETUP.md on the iteration machine

baseline:
  # Gate baseline is torch.compile, NOT eager — the whole point.
  mode: max-autotune
  also_record_eager: true

gates:
  correctness:                      # KernelBench-v2-style 5-stage, vs golden
    stages: [smoke, shape_sweep, adversarial_numerics, determinism, edge_cases]
    rtol: 2.0e-2
    atol: 2.0e-2
    shape_sweep_min_configs: 10
  build:
    builder: kernel-builder
    universal: true                 # Triton = universal (pure Python): no
                                    # per-SM compile, so target_caps is N/A
    target_caps: ["12.1", "8.6"]    # ONLY relevant if universal=false
    kernel_builder_rev: b4accba4496b28faef19a0487fbcf9686b14e2ef  # main/dffbce5
                                    # changed build.toml schema; this rev works
    nix_build_attr: ".#bundle"      # pure-Python tree; NOT .#build-and-copy
    load: "pythonpath_import"       # universal repos have no metadata.json,
                                    # so NOT kernels.get_local_kernel
    must_load_local_build: true
  perf:
    min_speedup_vs_compile: 1.05    # strictly > vs torch.compile(max-autotune)
    measured_on: spark
    warmup_iters: 25
    timed_iters: 100

loop:
  max_retries: 6                    # bounded budget
  feed_error_class_back: true
  stop_on_first_pass: false         # continue to integrate + e2e on pass

agent:
  # LLM that drives the autonomous loop (read by launch.sh, run via opencode).
  # Per-config: Spark uses the free OpenCode Zen DeepSeek; config.local.yaml
  # uses Gemini Flash via authenticated GitHub Copilot (opencode auth list).
  model: opencode/deepseek-v4-flash-free   # local: github-copilot/gemini-3-flash-preview

integration:
  mechanism: transformers_kernel_hook   # KernelConfig -> from_pretrained
  assert_kernel_invoked: true       # transformers#40459: use_kernels didn't
                                    # always fire — e2e MUST assert it does

publish:
  enabled: false                    # pipeline NEVER creates/pushes a Hub repo;
                                    # no auto-push path. Local artifact only.
  repo_template: "{model}-{block}-{lang}"
  local_only: true
